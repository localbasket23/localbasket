<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/config.js"></script>
  <base href="/" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Customers</title>

  <link rel="icon" type="image/png" href="./welcome/logo2.png?v=20260303">
  <link rel="icon" type="image/png" sizes="32x32" href="./welcome/logo2.png?v=20260303">
  <link rel="apple-touch-icon" sizes="180x180" href="./welcome/logo2.png?v=20260303">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/welcome/admin/admin-shared.css">

  <style>
    :root{
      --lav:#ff8a1a; --lav-light:#ffb347; --bg:#f8f9fd; --white:#fff;
      --text:#2d3436; --text-light:#636e72; --radius:16px;
      --shadow:0 10px 30px rgba(0,0,0,.05); --border:#edf0f7;
      --surface:#ffffff; --surface-2:#fafbff; --table-head:#f4f6fb;
      --row-hover:#fafaff; --muted:#9aa2b1;
    }
    *{ box-sizing:border-box; margin:0; padding:0; font-family:Poppins, sans-serif; }
    body{ background:var(--bg); color:var(--text); overflow-x:hidden; }
    body.dark{
      --bg:#111827; --white:#1f2937; --text:#f3f4f6; --text-light:#9ca3af;
      --border:#334155; --shadow:0 10px 30px rgba(0,0,0,.35); --surface:#111827;
      --surface-2:#0b1220; --table-head:#0b1220; --row-hover:#111b2d; --muted:#94a3b8;
    }
    #sidebarOverlay{ position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); z-index:1001; display:none; opacity:0; transition:0.3s; }
    #sidebarOverlay.show{ display:block; opacity:1; }
    .sidebar{ width:280px; height:100vh; position:fixed; left:0; top:0; background:linear-gradient(160deg,var(--lav),var(--lav-light)); color:#fff; padding:30px 20px; z-index:1002; }
    main{ margin-left:280px; padding:40px; }
    .topbar{ background:var(--white); padding:18px 25px; border-radius:var(--radius); display:flex; justify-content:space-between; align-items:center; box-shadow:var(--shadow); margin-bottom:18px; }
    .title{ display:flex; align-items:center; gap:10px; font-size:18px; font-weight:800; }
    .pill{ border:1px solid var(--border); background:var(--surface-2); color:var(--text); border-radius:999px; padding:10px 12px; font-size:13px; font-weight:700; display:flex; align-items:center; gap:8px; }
    .filters{
      background:var(--white); border:1px solid var(--border); border-radius:var(--radius);
      box-shadow:var(--shadow); padding:14px; margin-bottom:16px; display:flex; gap:12px; align-items:center; flex-wrap:wrap;
    }
    .search{ flex:1; min-width:240px; display:flex; align-items:center; gap:10px; background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:10px 14px; }
    .search i{ color:var(--muted); }
    .search input{ flex:1; border:none; outline:none; background:transparent; font-size:14px; color:var(--text); }
    select.pill{ cursor:pointer; }
    .btn{ border:none; cursor:pointer; border-radius:12px; padding:10px 14px; font-weight:800; background:var(--lav); color:#fff; box-shadow:0 10px 22px -12px rgba(255,138,26,.7); }
    .btn:disabled{ opacity:.65; cursor:not-allowed; }
    .btn-ghost{ background:transparent; color:var(--text); border:1px solid var(--border); box-shadow:none; }
    .btn-danger{ background:#ef4444; box-shadow:0 10px 22px -12px rgba(239,68,68,.55); }
    .btn-small{ padding:8px 10px; border-radius:10px; font-size:12px; font-weight:900; }
    .table-wrap{ background:var(--white); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
    table{ width:100%; border-collapse:collapse; }
    thead{ background:var(--table-head); }
    th, td{ padding:14px 14px; text-align:left; border-bottom:1px solid var(--border); font-size:14px; vertical-align:top; }
    th{ font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--text-light); }
    tbody tr:hover{ background:var(--row-hover); }
    .muted{ color:var(--text-light); font-size:12px; }
    .badge{ display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; font-size:12px; font-weight:900; border:1px solid var(--border); background:var(--surface-2); }
    .badge.active{ background:rgba(34,197,94,.16); border-color:rgba(34,197,94,.35); }
    .badge.blocked{ background:rgba(239,68,68,.14); border-color:rgba(239,68,68,.35); }
    .actions{ display:flex; gap:8px; flex-wrap:wrap; }

    /* Mobile "one frame" list UI */
    .cust-mobile{ display:none; }
    .cust-card{
      background:var(--white);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      margin-bottom:12px;
    }
    .cust-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
    .cust-left{ min-width:0; }
    .cust-left b{ display:block; font-size:16px; }
    .cust-left .muted{ word-break:break-word; }
    .cust-meta{ display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .cust-chip{
      display:inline-flex; align-items:center; gap:7px;
      padding:7px 10px; border-radius:999px;
      border:1px solid var(--border);
      background:var(--surface-2);
      font-size:12px; font-weight:900;
      max-width:100%;
    }
    .cust-chip i{ color:var(--muted); }
    .cust-block{
      margin-top:10px;
      background:rgba(239,68,68,.08);
      border:1px solid rgba(239,68,68,.22);
      border-radius:12px;
      padding:10px 12px;
      color:var(--text);
      font-size:13px;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .cust-actions{ margin-top:12px; display:flex; gap:10px; flex-wrap:wrap; }

    /* Customer details modal (mobile: bottom sheet) */
    #custModal .modal-content{ max-width:560px; }
    #custModal .modal-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; }
    #custModal .modal-title{ font-weight:900; color:var(--lav); display:flex; align-items:center; gap:10px; }
    #custModal .close-x{
      border:none; cursor:pointer; border-radius:12px; width:42px; height:42px;
      display:inline-flex; align-items:center; justify-content:center;
      background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    }
    #custModal .detail-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    #custModal .detail-item{
      background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:10px 12px;
      min-width:0;
    }
    #custModal .detail-item small{
      display:block; color:var(--muted); font-weight:800; font-size:11px;
      text-transform:uppercase; letter-spacing:.4px; margin-bottom:4px;
    }
    #custModal .detail-item div{ font-weight:800; word-break:break-word; }
    #custModal .detail-item.full{ grid-column:1 / -1; }

    @media (max-width: 600px){
      #custModal .modal-content{
        position:fixed;
        left:0; right:0; bottom:0;
        width:100%;
        max-width:none;
        border-radius:18px 18px 0 0;
        padding:16px;
        max-height:82vh;
        overflow:auto;
        transform:translateY(100%);
        transition:transform .25s ease;
      }
      #custModal.show .modal-content{ transform:translateY(0); }
      #custModal .detail-grid{ grid-template-columns:1fr; }
    }
    @media (max-width: 980px){
      main{ margin-left:0; padding:18px; }
      .sidebar{ transform:translateX(-110%); transition:0.3s; }
      .sidebar.open{ transform:translateX(0); }
      .topbar{ position:sticky; top:10px; z-index:1000; }
    }
    @media (max-width: 900px){
      .table-wrap{ display:none; }
      .cust-mobile{ display:block; }
    }
  </style>
</head>
<body>
  <div id="sidebarOverlay"></div>
  <div class="sidebar"></div>

  <main>
    <div class="topbar">
      <div class="title"><i class="fas fa-users"></i> Customers</div>
      <div style="display:flex; gap:10px; align-items:center;">
        <span class="pill" id="countPill"><i class="fas fa-user"></i> 0</span>
      </div>
    </div>

    <div class="filters">
      <div class="search">
        <i class="fas fa-search"></i>
        <input id="searchInput" placeholder="Search name, email, phone, id..." />
      </div>
      <select id="statusSelect" class="pill" title="Filter status">
        <option value="ALL">All</option>
        <option value="ACTIVE">Active</option>
        <option value="BLOCKED">Blocked</option>
      </select>
      <button class="btn" id="refreshBtn" type="button"><i class="fas fa-rotate"></i> Refresh</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:80px;">ID</th>
            <th style="width:260px;">Customer</th>
            <th style="width:140px;">Orders</th>
            <th style="width:160px;">Total Spent</th>
            <th style="width:140px;">Status</th>
            <th style="width:220px;">Actions</th>
          </tr>
        </thead>
        <tbody id="custBody">
          <tr><td colspan="6" style="text-align:center;padding:40px">Loading customers...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="cust-mobile" id="custMobile"></div>

    <div class="modal" id="custModal" aria-hidden="true" onclick="closeCustModal()">
      <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="custModalTitle" onclick="event.stopPropagation()">
        <div class="modal-head">
          <div class="modal-title" id="custModalTitle"><i class="fas fa-user"></i> Customer Details</div>
          <button class="close-x" type="button" onclick="closeCustModal()" aria-label="Close">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div id="custModalBody"></div>
      </div>
    </div>
  </main>

  <script>
    const API = `${window.API_BASE_URL}/api/admin`;
    const state = { all: [], filtered: [] };

    function escapeHtml(s){
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
    async function confirmAsync(msg){
      if (typeof window.lbConfirm === "function") return window.lbConfirm(msg);
      return Promise.resolve(window.confirm(msg));
    }

    function badge(isBlocked){
      return isBlocked
        ? `<span class="badge blocked"><i class="fas fa-ban"></i> BLOCKED</span>`
        : `<span class="badge active"><i class="fas fa-circle-check"></i> ACTIVE</span>`;
    }

    function applyFilter(){
      const q = (document.getElementById("searchInput").value || "").toLowerCase().trim();
      if (!q) state.filtered = [...state.all];
      else {
        state.filtered = state.all.filter(c => (
          String(c.id || "").toLowerCase().includes(q) ||
          String(c.name || "").toLowerCase().includes(q) ||
          String(c.email || "").toLowerCase().includes(q) ||
          String(c.phone || "").toLowerCase().includes(q)
        ));
      }
      render(state.filtered);
    }

    async function blockCustomer(id){
      const reason = window.prompt("Block reason (optional):", "");
      if (reason === null) return;
      const res = await fetch(`${API}/customers/${encodeURIComponent(String(id))}/block`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ reason: reason || "" })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.success === false) return window.alert(data.message || "Failed to block customer");
      await load();
    }

    async function unblockCustomer(id){
      const ok = await confirmAsync("Unblock this customer?");
      if (!ok) return;
      const res = await fetch(`${API}/customers/${encodeURIComponent(String(id))}/unblock`, { method: "PUT" });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.success === false) return window.alert(data.message || "Failed to unblock customer");
      await load();
    }

    async function deleteCustomer(id){
      const ok = await confirmAsync("Delete this customer? This cannot be undone.");
      if (!ok) return;
      const res = await fetch(`${API}/customers/${encodeURIComponent(String(id))}`, { method: "DELETE" });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.success === false) return window.alert(data.message || "Failed to delete customer");
      await load();
    }

    async function showDetails(c){
      const modal = document.getElementById("custModal");
      const body = document.getElementById("custModalBody");
      if (!modal || !body){
        const lines = [
          `ID: ${c.id}`,
          `Name: ${c.name || "-"}`,
          `Email: ${c.email || "-"}`,
          `Phone: ${c.phone || "-"}`,
          `Orders: ${c.orders_count || 0}`,
          `Total Spent: Rs. ${Number(c.total_spent || 0).toFixed(2)}`,
          `Status: ${c.is_blocked ? "BLOCKED" : "ACTIVE"}`,
          c.is_blocked ? `Blocked At: ${c.blocked_at || "-"}` : "",
          c.is_blocked ? `Reason: ${c.block_reason || "-"}` : "",
          `Created: ${c.created_at || "-"}`
        ].filter(Boolean);
        window.alert(lines.join("\n"));
        return;
      }

      function item(label, value, full){
        const safeLabel = escapeHtml(label);
        const safeValue = escapeHtml(value == null || value === "" ? "-" : String(value));
        return `<div class="detail-item ${full ? "full" : ""}"><small>${safeLabel}</small><div>${safeValue}</div></div>`;
      }

      const statusText = c.is_blocked ? "BLOCKED" : "ACTIVE";
      const totalSpent = `Rs. ${Number(c.total_spent || 0).toFixed(2)}`;

      body.innerHTML = `
        <div class="detail-grid">
          ${item("ID", `#${c.id}`)}
          ${item("Status", statusText)}
          ${item("Name", c.name || "Customer", true)}
          ${item("Email", c.email || "-", true)}
          ${item("Phone", c.phone || "-", true)}
          ${item("Orders", Number(c.orders_count || 0))}
          ${item("Total Spent", totalSpent)}
          ${c.is_blocked ? item("Blocked At", c.blocked_at || "-") : ""}
          ${c.is_blocked ? item("Block Reason", c.block_reason || "-", true) : ""}
          ${item("Created", c.created_at || "-", true)}
        </div>
      `;

      modal.classList.add("show");
      modal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeCustModal(){
      const modal = document.getElementById("custModal");
      if (!modal) return;
      modal.classList.remove("show");
      modal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "auto";
    }
    window.closeCustModal = closeCustModal;

    function render(list){
      const tbody = document.getElementById("custBody");
      const countPill = document.getElementById("countPill");
      const mobile = document.getElementById("custMobile");
      tbody.innerHTML = "";
      if (mobile) mobile.innerHTML = "";
      if (!list.length){
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted)">No customers found.</td></tr>`;
        if (countPill) countPill.innerHTML = `<i class="fas fa-user"></i> 0`;
        if (mobile) mobile.innerHTML = `<div style="text-align:center;padding:24px;color:var(--muted);">No customers found.</div>`;
        return;
      }

      tbody.innerHTML = list.map(c => {
        const who = `
          <div style="font-weight:800;">${escapeHtml(c.name || "Customer")}</div>
          <div class="muted">${escapeHtml(c.email || "-")}</div>
          <div class="muted">${escapeHtml(c.phone || "")}</div>
        `;

        const actions = c.is_blocked
          ? `
              <button class="btn btn-ghost btn-small" type="button" onclick="window.unblockCust(${Number(c.id)})"><i class="fas fa-unlock"></i> Unblock</button>
              <button class="btn btn-danger btn-small" type="button" onclick="window.deleteCust(${Number(c.id)})"><i class="fas fa-trash"></i> Delete</button>
            `
          : `
              <button class="btn btn-small" type="button" onclick="window.blockCust(${Number(c.id)})"><i class="fas fa-ban"></i> Block</button>
              <button class="btn btn-danger btn-small" type="button" onclick="window.deleteCust(${Number(c.id)})"><i class="fas fa-trash"></i> Delete</button>
            `;

        return `
          <tr>
            <td><b>#${c.id}</b></td>
            <td>${who}<div style="margin-top:8px"><button class="btn btn-ghost btn-small" type="button" onclick="window.showCust(${Number(c.id)})"><i class="fas fa-circle-info"></i> Details</button></div></td>
            <td><b>${Number(c.orders_count || 0)}</b></td>
            <td><b>Rs. ${Number(c.total_spent || 0).toFixed(2)}</b></td>
            <td>${badge(Boolean(c.is_blocked))}</td>
            <td><div class="actions">${actions}</div></td>
          </tr>
        `;
      }).join("");

      if (countPill) countPill.innerHTML = `<i class="fas fa-user"></i> ${list.length}`;

      if (mobile){
        mobile.innerHTML = list.map(c => {
          const id = Number(c.id);
          const name = escapeHtml(c.name || "Customer");
          const email = escapeHtml(c.email || "-");
          const phone = escapeHtml(c.phone || "");
          const orders = Number(c.orders_count || 0);
          const spent = `Rs. ${Number(c.total_spent || 0).toFixed(2)}`;
          const created = escapeHtml(c.created_at || "-");
          const isBlocked = Boolean(c.is_blocked);
          const blockedAt = escapeHtml(c.blocked_at || "-");
          const blockReason = escapeHtml(c.block_reason || "-");

          const actionBtns = isBlocked
            ? `
                <button class="btn btn-ghost btn-small" type="button" onclick="window.unblockCust(${id})"><i class="fas fa-unlock"></i> Unblock</button>
                <button class="btn btn-danger btn-small" type="button" onclick="window.deleteCust(${id})"><i class="fas fa-trash"></i> Delete</button>
              `
            : `
                <button class="btn btn-small" type="button" onclick="window.blockCust(${id})"><i class="fas fa-ban"></i> Block</button>
                <button class="btn btn-danger btn-small" type="button" onclick="window.deleteCust(${id})"><i class="fas fa-trash"></i> Delete</button>
              `;

          return `
            <div class="cust-card">
              <div class="cust-top">
                <div class="cust-left">
                  <div style="font-weight:900; color:var(--text-light); font-size:12px;">ID #${id}</div>
                  <b>${name}</b>
                  <div class="muted">${email}</div>
                  ${phone ? `<div class="muted">${phone}</div>` : ``}
                </div>
                <div>${badge(isBlocked)}</div>
              </div>

              <div class="cust-meta">
                <span class="cust-chip"><i class="fas fa-bag-shopping"></i> Orders: ${orders}</span>
                <span class="cust-chip"><i class="fas fa-indian-rupee-sign"></i> Spent: ${escapeHtml(spent)}</span>
                <span class="cust-chip"><i class="fas fa-calendar"></i> Created: ${created}</span>
              </div>

              ${isBlocked ? `
                <div class="cust-block">
                  <div style="font-weight:900; margin-bottom:6px;"><i class="fas fa-ban"></i> Blocked</div>
                  <div><b>At:</b> ${blockedAt}</div>
                  <div><b>Reason:</b> ${blockReason}</div>
                </div>
              ` : ``}

              <div class="cust-actions">
                <button class="btn btn-ghost btn-small" type="button" onclick="window.showCust(${id})"><i class="fas fa-circle-info"></i> Details</button>
                ${actionBtns}
              </div>
            </div>
          `;
        }).join("");
      }
    }

    async function load(){
      const status = String(document.getElementById("statusSelect").value || "ALL").trim().toUpperCase();
      const btn = document.getElementById("refreshBtn");
      if (btn) btn.disabled = true;
      try{
        const res = await fetch(`${API}/customers?status=${encodeURIComponent(status)}&limit=200`, { cache: "no-store" });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.success === false) throw new Error(data.message || "Failed");
        state.all = data.customers || [];
        applyFilter();
      } catch (e){
        document.getElementById("custBody").innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted)">Failed to load customers.</td></tr>`;
        const mobile = document.getElementById("custMobile");
        if (mobile) mobile.innerHTML = `<div style="text-align:center;padding:24px;color:var(--muted);">Failed to load customers.</div>`;
      } finally{
        if (btn) btn.disabled = false;
      }
    }

    window.blockCust = blockCustomer;
    window.unblockCust = unblockCustomer;
    window.deleteCust = deleteCustomer;
    window.showCust = (id) => {
      const c = state.all.find(x => Number(x.id) === Number(id));
      if (c) showDetails(c);
    };

    document.getElementById("searchInput").addEventListener("input", applyFilter);
    document.getElementById("statusSelect").addEventListener("change", load);
    document.getElementById("refreshBtn").addEventListener("click", load);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeCustModal();
    });
    load();
  </script>

  <script src="/welcome/admin/admin-layout.js"></script>
  <div id="footer"></div>
  <script src="/js/include.js?v=20260313a"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/theme.js"></script>
</body>
</html>
