<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/config.js"></script>
  <base href="/" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="48x48" href="./favicon.png">
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="shortcut icon" href="./favicon.ico">
  <link rel="apple-touch-icon" href="./favicon.png">
  <meta name="theme-color" content="#ff8a1a">
  <title>Local Basket - Online Grocery Store in Mumbai</title>
  <meta name="description" content="Local Basket is an online grocery store offering fresh vegetables, fruits and daily essentials with fast delivery in Mumbai." />
  <noscript>
    <meta http-equiv="refresh" content="3;url=./welcome/customer/index.html" />
  </noscript>
  <style>
    :root {
      --bg-1: #ffffff;
      --bg-2: #fff7ed;
      --accent: #ff8a1a;
      --accent-2: #ffb347;
      --text: #0f172a;
      --muted: #64748b;
      --card: rgba(255, 255, 255, 0.82);
      --card-border: rgba(255, 255, 255, 0.7);
      --shadow: 0 14px 30px -16px rgba(15, 23, 42, 0.24);
      --radius: 26px;
      --track: #e2e8f0;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, var(--bg-2), var(--bg-1)),
        radial-gradient(980px 560px at 70% 12%, rgba(255,138,26,0.18), rgba(255,138,26,0) 62%),
        radial-gradient(820px 520px at 18% 88%, rgba(255,179,71,0.14), rgba(255,179,71,0) 64%);
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.08;
      background-image:
        repeating-linear-gradient(0deg, rgba(15,23,42,0.05) 0, rgba(15,23,42,0.05) 1px, rgba(15,23,42,0) 1px, rgba(15,23,42,0) 9px),
        repeating-linear-gradient(90deg, rgba(15,23,42,0.04) 0, rgba(15,23,42,0.04) 1px, rgba(15,23,42,0) 1px, rgba(15,23,42,0) 10px);
      mix-blend-mode: multiply;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(740px 460px at 50% 32%, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0) 74%);
      filter: blur(10px);
      opacity: 0.65;
    }

    .launch-card {
      width: min(560px, calc(100vw - 28px));
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: var(--radius);
      padding: 28px 24px 22px;
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(14px);
      text-align: center;
      box-shadow: var(--shadow);
      animation: cardIn 0.55s ease both;
      position: relative;
      overflow: hidden;
    }

    .launch-card::before {
      content: "";
      position: absolute;
      inset: -1px;
      background:
        radial-gradient(90% 70% at 20% 0%, rgba(255, 179, 71, 0.20), rgba(255, 179, 71, 0) 62%),
        radial-gradient(80% 60% at 85% 100%, rgba(255, 138, 26, 0.12), rgba(255, 138, 26, 0) 62%);
      pointer-events: none;
    }

    .content {
      position: relative;
    }

    .logo-wrap {
      width: 92px;
      height: 92px;
      margin: 0 auto 16px;
      border-radius: 26px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(15, 23, 42, 0.08);
      background:
        radial-gradient(120% 120% at 50% 20%, rgba(255,255,255,0.98), rgba(255,255,255,0.78));
      box-shadow: 0 14px 30px -24px rgba(15, 23, 42, 0.35);
      animation: floaty 2.1s ease-in-out infinite;
    }

    .logo-wrap img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      filter: drop-shadow(0 0 16px rgba(255, 165, 0, 0.38));
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 7vw, 46px);
      letter-spacing: -1px;
      line-height: 1;
      color: #0f172a;
    }

    p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
    }

    .progress {
      margin: 18px auto 10px;
      width: min(360px, 92%);
      height: 8px;
      border-radius: 999px;
      background: #f1f5f9;
      border: 1px solid rgba(15, 23, 42, 0.08);
      overflow: hidden;
      position: relative;
    }

    .progress > .bar {
      position: absolute;
      inset: 0;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ff8c00, #ffb347);
      box-shadow: 0 10px 24px -18px rgba(255, 138, 26, 0.55);
      transition: width 80ms linear;
    }

    .progress::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 40%;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.55), rgba(255,255,255,0));
      transform: translateX(-120%);
      animation: sheen 1.35s ease-in-out infinite;
      pointer-events: none;
    }

    .fallback {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 30px;
      min-height: 46px;
      padding: 12px 28px;
      border: 0;
      background: linear-gradient(135deg, #ff8c00, #ffa726);
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      box-shadow: 0 20px 40px -28px rgba(255, 138, 26, 0.75);
      transition: transform 120ms ease, filter 120ms ease;
    }

    .fallback:hover { transform: scale(1.05); filter: brightness(1.05); }
    .fallback:active { transform: translateY(0); }
    .fallback:focus-visible { outline: none; box-shadow: 0 0 0 4px rgba(255, 138, 26, 0.28), 0 20px 40px -28px rgba(255, 138, 26, 0.75); }

    .countdown {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .footer-line {
      margin-top: 14px;
      font-size: 12px;
      color: rgba(100, 116, 139, 0.9);
      font-weight: 700;
    }

    @keyframes sheen {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-3px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .launch-card { animation: none; }
      .logo-wrap { animation: none; }
      .progress::after { animation: none; }
      .progress > .bar { transition: none; }
      .fallback { transition: none; }
    }
  </style>
</head>
<body>
  <main class="launch-card" role="status" aria-live="polite">
    <div class="content">
      <div class="logo-wrap">
        <img src="./welcome/logo2.png?v=20260303" alt="LocalBasket logo" />
      </div>
      <h1>LocalBasket</h1>
      <p>Connecting you to your local stores</p>
      <div class="progress" aria-hidden="true"><div class="bar" id="progressBar"></div></div>
      <a class="fallback" href="./welcome/customer/index.html">Enter Marketplace</a>
      <div class="countdown" id="countdown">Redirecting in 3s...</div>
      <div class="footer-line">Serving your neighborhood with fresh groceries</div>
    </div>
  </main>
  <script>
    const target = "./welcome/customer/index.html";
    const countdownEl = document.getElementById("countdown");
    const progressBar = document.getElementById("progressBar");

    const durationMs = 3000;
    const startedAt = performance.now();
    let remaining = 3;

    const tick = () => {
      if (!countdownEl) return;
      countdownEl.textContent = `Redirecting in ${remaining}s...`;
    };

    tick();
    const interval = setInterval(() => {
      remaining -= 1;
      if (remaining <= 0) {
        clearInterval(interval);
        window.location.replace(target);
        return;
      }
      tick();
    }, 1000);

    const animate = () => {
      const elapsed = performance.now() - startedAt;
      const t01 = Math.max(0, Math.min(1, elapsed / durationMs));
      if (progressBar) progressBar.style.width = `${Math.round(t01 * 100)}%`;
      if (t01 < 1) requestAnimationFrame(animate);
    };
    requestAnimationFrame(animate);
  </script>
</body>
</html>
