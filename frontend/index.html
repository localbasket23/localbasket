<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/config.js"></script>
  <base href="/" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="48x48" href="./favicon.png">
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="shortcut icon" href="./favicon.ico">
  <link rel="apple-touch-icon" href="./favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#ff8a1a">
  <title>Local Basket - Online Grocery Store in Mumbai</title>
  <meta name="description" content="Local Basket is an online grocery store offering fresh vegetables, fruits and daily essentials with fast delivery in Mumbai." />
  <noscript>
    <meta http-equiv="refresh" content="3;url=./welcome/customer/index.html" />
  </noscript>
  <style>
    :root {
      --bg-1: #ffffff;
      --bg-2: #fff7ed;
      --accent: #ff8a1a;
      --accent-2: #ffb347;
      --text: #0f172a;
      --muted: #475569;
      --card: rgba(255, 255, 255, 0.95);
      --card-border: rgba(15, 23, 42, 0.10);
      --shadow: 0 18px 50px -28px rgba(15, 23, 42, 0.25);
      --radius: 26px;
      --track: #e2e8f0;
      --px: 50%;
      --py: 35%;
      --rx: 0deg;
      --ry: 0deg;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      position: relative;
      isolation: isolate;
      background:
        radial-gradient(1100px 720px at 50% 0%, rgba(255, 138, 26, 0.16), rgba(255, 138, 26, 0) 60%),
        radial-gradient(1000px 700px at 15% 100%, rgba(255, 179, 71, 0.14), rgba(255, 179, 71, 0) 62%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.2;
      background:
        radial-gradient(1200px 700px at 70% 35%, rgba(59,130,246,0.06), rgba(59,130,246,0) 60%);
      z-index: -3;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(820px 520px at 50% 28%, rgba(255, 138, 26, 0.08), rgba(255, 138, 26, 0) 72%),
        radial-gradient(920px 620px at 55% 38%, rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0) 72%);
      filter: blur(14px);
      opacity: 0.45;
      z-index: -2;
    }

    .bg-dots {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.28;
      background-image: radial-gradient(rgba(15,23,42,0.08) 1px, rgba(15,23,42,0) 1px);
      background-size: 22px 22px;
      background-position: 10px 10px;
      mask-image: radial-gradient(70% 70% at 50% 25%, #000 55%, transparent 75%);
      z-index: -2;
    }

    .bg-blob {
      position: fixed;
      inset: -20%;
      pointer-events: none;
      opacity: 0.35;
      filter: blur(34px);
      transform: translate3d(0,0,0);
      background:
        radial-gradient(closest-side, rgba(255, 138, 26, 0.18), rgba(255, 138, 26, 0) 70%),
        radial-gradient(closest-side, rgba(255, 179, 71, 0.14), rgba(255, 179, 71, 0) 70%),
        radial-gradient(closest-side, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0) 70%);
      animation: blobDrift 10s ease-in-out infinite;
      z-index: -1;
    }

    .launch-card {
      width: min(560px, calc(100vw - 28px));
      border-radius: var(--radius);
      padding: 0;
      background: transparent;
      text-align: center;
      animation: cardIn 0.55s ease both;
      position: relative;
      overflow: hidden;
      transition: transform 180ms ease, box-shadow 180ms ease;
      z-index: 1;
    }

    .launch-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 44px -22px rgba(15, 23, 42, 0.28);
    }

    .card-surface {
      position: relative;
      border-radius: var(--radius);
      padding: 30px 26px 22px;
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      overflow: hidden;
      transform: perspective(900px) rotateX(var(--rx)) rotateY(var(--ry)) translateZ(0);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .launch-card:hover .card-surface {
      transform: translateY(-1px);
      box-shadow: 0 22px 60px -32px rgba(15, 23, 42, 0.26);
    }

    .card-surface::before {
      content: "";
      position: absolute;
      inset: 0;
      padding: 1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255, 138, 26, 0.35), rgba(255, 255, 255, 0.9), rgba(255, 138, 26, 0.18));
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.9;
    }

    .card-surface::after {
      content: "";
      position: absolute;
      inset: -1px;
      pointer-events: none;
      background:
        radial-gradient(90% 70% at 20% 0%, rgba(255, 179, 71, 0.18), rgba(255, 179, 71, 0) 62%),
        radial-gradient(80% 60% at 85% 100%, rgba(255, 138, 26, 0.10), rgba(255, 138, 26, 0) 62%),
        radial-gradient(220px 160px at var(--px) var(--py), rgba(255, 138, 26, 0.12), rgba(255, 138, 26, 0) 72%);
      opacity: 0.7;
    }

    .launch-card::before {
      content: "";
      position: absolute;
      inset: -1px;
      background: radial-gradient(120% 90% at 50% 0%, rgba(255, 138, 26, 0.06), rgba(255, 138, 26, 0) 60%);
      pointer-events: none;
    }

    .content {
      position: relative;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 138, 26, 0.12);
      border: 1px solid rgba(255, 138, 26, 0.18);
      color: #9a3412;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.2px;
      margin: 0 auto 14px;
      user-select: none;
    }

    .badge i {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff8c00, #ffb347);
      box-shadow: 0 0 0 4px rgba(255, 138, 26, 0.16);
      display: inline-block;
    }

    @media (max-width: 520px) {
      /* Mobile: avoid "double launching" feel */
      .badge { display: none; }
    }

    .logo-wrap {
      width: 92px;
      height: 92px;
      margin: 0 auto 16px;
      border-radius: 26px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(15, 23, 42, 0.08);
      background:
        radial-gradient(120% 120% at 50% 20%, rgba(255,255,255,0.98), rgba(255,255,255,0.78));
      box-shadow: 0 14px 30px -24px rgba(15, 23, 42, 0.35);
      animation: floaty 2.1s ease-in-out infinite;
      transition: transform 180ms ease, box-shadow 180ms ease;
      position: relative;
    }

    .logo-wrap::before {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 34px;
      border: 2px dashed rgba(255, 138, 26, 0.22);
      opacity: 0.9;
      animation: orbit 4.4s linear infinite;
      pointer-events: none;
    }

    .logo-wrap::after {
      content: "";
      position: absolute;
      inset: -18px;
      border-radius: 34px;
      background: radial-gradient(closest-side, rgba(255, 138, 26, 0.18), rgba(255, 138, 26, 0) 65%);
      filter: blur(10px);
      opacity: 0.9;
      pointer-events: none;
      z-index: -1;
    }

    .launch-card:hover .logo-wrap {
      transform: translateY(-1px) rotate(-0.8deg);
      box-shadow: 0 18px 44px -28px rgba(15, 23, 42, 0.38);
    }

    .logo-wrap img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      filter: drop-shadow(0 0 16px rgba(255, 165, 0, 0.38));
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 7vw, 46px);
      letter-spacing: -1px;
      line-height: 1;
      color: #0f172a;
      font-weight: 800;
      background: linear-gradient(180deg, #0f172a, #334155);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
    }

    .content p {
      max-width: 44ch;
      margin-left: auto;
      margin-right: auto;
    }

    .tip {
      margin-top: 8px;
      font-size: 13px;
      color: rgba(71, 85, 105, 0.92);
      font-weight: 700;
      min-height: 18px;
    }

    .pills {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .pill {
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      color: #0f172a;
      background: rgba(255, 138, 26, 0.10);
      border: 1px solid rgba(255, 138, 26, 0.18);
      user-select: none;
      white-space: nowrap;
    }

    @media (max-width: 520px) {
      .pills { display: none; }
    }

    .progress {
      margin: 18px auto 10px;
      width: min(360px, 92%);
      height: 8px;
      border-radius: 999px;
      background: #f1f5f9;
      border: 1px solid rgba(15, 23, 42, 0.08);
      overflow: hidden;
      position: relative;
    }

    .progress > .bar {
      position: absolute;
      inset: 0;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ff8c00, #ffb347);
      box-shadow: 0 10px 24px -18px rgba(255, 138, 26, 0.55);
      transition: width 80ms linear;
    }

    .progress::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 40%;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.55), rgba(255,255,255,0));
      transform: translateX(-120%);
      animation: sheen 1.35s ease-in-out infinite;
      pointer-events: none;
    }

    .fallback {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 30px;
      min-height: 46px;
      padding: 12px 28px;
      border: 0;
      background: linear-gradient(135deg, #ff8c00, #ffa726);
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      box-shadow: 0 20px 40px -28px rgba(255, 138, 26, 0.75);
      transition: transform 120ms ease, filter 120ms ease;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .fallback:hover { transform: scale(1.05); filter: brightness(1.05); }
    .fallback:active { transform: translateY(0); }
    .fallback:focus-visible { outline: none; box-shadow: 0 0 0 4px rgba(255, 138, 26, 0.28), 0 20px 40px -28px rgba(255, 138, 26, 0.75); }

    .ripple {
      position: absolute;
      border-radius: 999px;
      transform: scale(0);
      opacity: 0.55;
      background: rgba(255, 255, 255, 0.65);
      animation: ripple 520ms ease-out forwards;
      pointer-events: none;
      z-index: 0;
    }

    .countdown {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .footer-line {
      margin-top: 14px;
      font-size: 12px;
      color: rgba(100, 116, 139, 0.9);
      font-weight: 700;
    }

    @keyframes sheen {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }

    @keyframes ripple {
      from { transform: scale(0); opacity: 0.55; }
      to { transform: scale(1); opacity: 0; }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-3px); }
    }

    @keyframes orbit {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes blobDrift {
      0% { transform: translate3d(-2%, -2%, 0) rotate(0deg); }
      50% { transform: translate3d(2.5%, 2%, 0) rotate(6deg); }
      100% { transform: translate3d(-2%, -2%, 0) rotate(0deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .launch-card { animation: none; }
      .card-surface { transition: none; }
      .logo-wrap { animation: none; }
      .logo-wrap::before { animation: none; }
      .progress::after { animation: none; }
      .progress > .bar { transition: none; }
      .fallback { transition: none; }
      .bg-blob { animation: none; }
      .launch-card { transition: none; }
      .logo-wrap { transition: none; }
    }
  </style>
</head>
<body>
  <div class="bg-blob" aria-hidden="true"></div>
  <div class="bg-dots" aria-hidden="true"></div>
  <main class="launch-card" id="launchCard" role="status" aria-live="polite">
    <div class="card-surface">
    <div class="content">
      <div class="badge" aria-hidden="true"><i></i> Launching</div>
      <div class="logo-wrap">
        <img src="./welcome/logo2.png?v=20260303" alt="LocalBasket logo" />
      </div>
      <h1>LocalBasket</h1>
      <p>Launching your local grocery marketplace</p>
      <div class="tip" id="tip" aria-hidden="true">Fresh picks, delivered fast</div>
      <div class="pills" aria-hidden="true">
        <div class="pill">Fast delivery</div>
        <div class="pill">Fresh items</div>
        <div class="pill">Trusted local stores</div>
      </div>
      <div class="progress" aria-hidden="true"><div class="bar" id="progressBar"></div></div>
      <a class="fallback" id="enterBtn" href="./welcome/customer/index.html">Enter Marketplace</a>
      <div class="countdown" id="countdown">Redirecting in 3s...</div>
      <div class="footer-line">Serving your neighborhood with fresh groceries</div>
    </div>
    </div>
  </main>
  <script>
    const target = "./welcome/customer/index.html";
    const card = document.getElementById("launchCard");
    const enterBtn = document.getElementById("enterBtn");
    const countdownEl = document.getElementById("countdown");
    const progressBar = document.getElementById("progressBar");
    const tipEl = document.getElementById("tip");
    const surface = document.querySelector(".card-surface");

    // Prevent in-page "launch overlays" (e.g. from `js/include.js`) so users don't
    // experience a second launch screen after redirect.
    try { sessionStorage.setItem("lbLaunchSeen", "1"); } catch {}

    const durationMs = 3000;
    const startedAt = performance.now();
    let remaining = 3;

    const prefersReduce = (() => {
      try { return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches; } catch { return false; }
    })();

    if (card && !prefersReduce) {
      const setPointerGlow = (ev) => {
        const rect = card.getBoundingClientRect();
        const x = Math.max(0, Math.min(rect.width, ev.clientX - rect.left));
        const y = Math.max(0, Math.min(rect.height, ev.clientY - rect.top));
        card.style.setProperty("--px", `${Math.round(x)}px`);
        card.style.setProperty("--py", `${Math.round(y)}px`);
      };
      card.addEventListener("pointermove", setPointerGlow, { passive: true });
      card.addEventListener("pointerleave", () => {
        card.style.setProperty("--px", "50%");
        card.style.setProperty("--py", "35%");
      }, { passive: true });
    }

    if (surface && card && !prefersReduce) {
      const setTilt = (ev) => {
        const rect = card.getBoundingClientRect();
        const dx = (ev.clientX - rect.left) / rect.width - 0.5;
        const dy = (ev.clientY - rect.top) / rect.height - 0.5;
        const ry = Math.max(-6, Math.min(6, dx * 10));
        const rx = Math.max(-6, Math.min(6, -dy * 10));
        surface.style.setProperty("--rx", `${rx.toFixed(2)}deg`);
        surface.style.setProperty("--ry", `${ry.toFixed(2)}deg`);
      };
      card.addEventListener("pointermove", setTilt, { passive: true });
      card.addEventListener("pointerleave", () => {
        surface.style.setProperty("--rx", "0deg");
        surface.style.setProperty("--ry", "0deg");
      }, { passive: true });
    }

    if (enterBtn && !prefersReduce) {
      enterBtn.addEventListener("click", (ev) => {
        const rect = enterBtn.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height) * 1.15;
        const ripple = document.createElement("span");
        ripple.className = "ripple";
        ripple.style.width = `${Math.round(size)}px`;
        ripple.style.height = `${Math.round(size)}px`;
        ripple.style.left = `${Math.round(ev.clientX - rect.left - size / 2)}px`;
        ripple.style.top = `${Math.round(ev.clientY - rect.top - size / 2)}px`;
        enterBtn.appendChild(ripple);
        window.setTimeout(() => ripple.remove(), 650);
      });
    }

    if (tipEl && !prefersReduce) {
      const tips = [
        "Fresh picks, delivered fast",
        "Veggies • Fruits • Daily essentials",
        "Secure checkout and easy returns",
      ];
      let tipIndex = 0;
      window.setInterval(() => {
        tipIndex = (tipIndex + 1) % tips.length;
        tipEl.style.opacity = "0";
        window.setTimeout(() => {
          tipEl.textContent = tips[tipIndex];
          tipEl.style.opacity = "1";
        }, 160);
      }, 1200);
    }

    const tick = () => {
      if (!countdownEl) return;
      countdownEl.textContent = `Redirecting in ${remaining}s...`;
    };

    tick();
    const interval = setInterval(() => {
      remaining -= 1;
      if (remaining <= 0) {
        clearInterval(interval);
        window.location.replace(target);
        return;
      }
      tick();
    }, 1000);

    const animate = () => {
      const elapsed = performance.now() - startedAt;
      const t01 = Math.max(0, Math.min(1, elapsed / durationMs));
      if (progressBar) progressBar.style.width = `${Math.round(t01 * 100)}%`;
      if (t01 < 1) requestAnimationFrame(animate);
    };
    requestAnimationFrame(animate);
  </script>
</body>
</html>
