<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png">
  <link rel="shortcut icon" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="theme-color" content="#16a34a">
  <title>Local Basket - Online Grocery Store in Mumbai</title>
  <meta name="description" content="Local Basket is an online grocery store offering fresh vegetables, fruits and daily essentials with fast delivery in Mumbai." />
  <meta http-equiv="refresh" content="6;url=/welcome/customer/index.html" />
  <style>
    :root {
      --bg-1: #07133a;
      --bg-2: #0b1f52;
      --accent: #ff8a1a;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
      overflow: hidden;
    }
    body {
      display: grid;
      place-items: center;
      background:
        radial-gradient(120% 90% at 90% 10%, rgba(255,138,26,0.2), rgba(255,138,26,0) 50%),
        radial-gradient(90% 70% at 0% 100%, rgba(59,130,246,0.18), rgba(59,130,246,0) 55%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      color: var(--text);
    }
    .launch-card {
      width: min(560px, calc(100vw - 28px));
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 22px;
      padding: 26px 22px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      text-align: center;
      box-shadow: 0 24px 44px -28px rgba(0,0,0,0.6);
      animation: cardIn 0.55s ease both;
    }
    .logo-wrap {
      width: 92px;
      height: 92px;
      margin: 0 auto 14px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      animation: pulse 1.6s ease-in-out infinite;
    }
    .logo-wrap img {
      width: 70px;
      height: 70px;
      object-fit: contain;
    }
    h1 {
      margin: 0;
      font-size: clamp(30px, 7vw, 46px);
      letter-spacing: -1px;
      line-height: 1;
    }
    p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
    }
    .loader {
      margin: 18px auto 6px;
      width: min(320px, 90%);
      height: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,0.15);
      overflow: hidden;
      position: relative;
    }
    .loader::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 42%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ff9f2f, var(--accent));
      animation: load 2.2s ease-in-out infinite;
    }
    .fallback {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      min-height: 42px;
      padding: 0 14px;
      border: 0;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      font-size: 14px;
    }
    @keyframes load {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <main class="launch-card" role="status" aria-live="polite">
    <div class="logo-wrap">
      <img src="/welcome/logo2.png" alt="LocalBasket logo" />
    </div>
    <h1>LocalBasket</h1>
    <p>Launching your neighborhood marketplace...</p>
    <div class="loader" aria-hidden="true"></div>
    <a class="fallback" href="/welcome/customer/index.html">Enter Now</a>
  </main>

  <script>
    setTimeout(function () {
      window.location.replace("/welcome/customer/index.html");
    }, 2600);
  </script>
</body>
</html>
